---
layout: default
---

<article class="post-article">
  <div class="post-group">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.image %}
      <img class="post-float" src="{{ page.image }}" alt="{{ page.title }}">
    {% endif %}
    <div class="post-content">
      {{ content }}
    </div>
  </div>
  <br>
  <br>
  <br>
</article>
